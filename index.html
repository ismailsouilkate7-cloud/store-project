<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mireva Store</title>

<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="home.css">
</head>

<body>

<header class="header">

    <div class="left-side">

        <button class="icon-btn" id="menuBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="black" stroke-width="2"/>
            </svg>
        </button>

        <img src="logo/788fd425-213d-481e-93d4-e9b938e7e235.png" class="logo">

        <button class="icon-btn" id="searchBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="black" stroke-width="2"/>
                <path d="M16.5 16.5 21 21" stroke="black" stroke-width="2"/>
            </svg>
        </button>

        <button class="icon-btn" id="cartBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M6 6h15l-2 9H7L6 6Z" stroke="black" stroke-width="2"/>
                <path d="M6 6 5 3H2" stroke="black" stroke-width="2"/>
                <path d="M9 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2ZM18 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" stroke="black" stroke-width="2"/>
            </svg>
        </button>

    </div>

    <div class="Accessoires-links">
        <b>
            <a href="index.html" class="link1">Accessoires</a>
        </b>
    </div>

</header>

<div class="search-box" id="searchBox">
    <input type="text" id="searchInput" placeholder="Search products...">
</div>

<div class="sidebar" id="sidebar">
    <h3>Filter</h3>
    <button onclick="filterProducts('Braclet')" class="btn1">Braclet</button>
    <button onclick="filterProducts('Bagues')" class="btn2">Boucles d’oreilles</button>
    <button onclick="filterProducts('Montre')" class="btn2">Montre</button>
    <button onclick="filterProducts('Collier')" class="btn3">Collier</button>
    <button onclick="filterProducts('Packs')" class="btn4">Packs</button>
    <button onclick="filterProducts('Tous')" class="btn5">Tous</button>

</div>

<div class="cart-panel" id="cartPanel">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <button class="order-btn" onclick="sendWhatsApp()">Commander via WhatsApp</button>
</div>

<section class="products" id="products"></section>

<script src="home.js"></script>
</body>
</html>
